apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aicap.configMapName" . }}
  labels:
    {{- include "aicap.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  RUN_MIGRATIONS: {{ .Values.config.runMigrations | quote }}
  VITE_FRONTEND_URL: {{ .Values.config.viteFrontendUrl | quote }}
  STRIPE_PRICE_ID: {{ .Values.config.stripePriceId | quote }}
