{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aicap.secretName" . }}
  labels:
    {{- include "aicap.labels" . | nindent 4 }}
type: Opaque
stringData:
  SUPABASE_DB_URL: {{ .Values.secrets.supabaseDbUrl | quote }}
  SUPABASE_JWT_SECRET: {{ .Values.secrets.supabaseJwtSecret | quote }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  AICAP_LEDGER_SIGNING_KEY: {{ .Values.secrets.ledgerSigningKey | quote }}
{{- end }}
