# AIcap — Continuous AI-BOM & EU AI Act Compliance Scanner
# GitLab CI template
#
# Two ways to use this file:
#
#   1. Include it from your project's .gitlab-ci.yml:
#
#        include:
#          - remote: 'https://raw.githubusercontent.com/istrategeorge/AIcap/main/templates/gitlab-ci.yml'
#
#      Then either rely on the default `aicap_compliance_scan` job or
#      extend it (`extends: .aicap-base`) to customise per-pipeline.
#
#   2. Copy this file into your repo as `.gitlab-ci.yml` and edit
#      directly.
#
# Required CI/CD Variable (Settings → CI/CD → Variables):
#   AICAP_API_KEY   — your Pro API key. Mark as "Masked" + "Protected".
#                     Free users can omit this; the scanner will run
#                     locally without cloud sync (subject to the
#                     10-scan-per-30-days free-tier rolling limit if
#                     unauthenticated against the SaaS).
#
# Optional CI/CD Variables:
#   AICAP_VERSION   — pin a specific release tag (default: v1.3.3).
#   AICAP_OSV_DISABLED — set to "true" to skip OSV.dev CVE/GHSA enrichment.

variables:
  AICAP_VERSION: "v1.3.3"

# Reusable base — extend this for custom jobs (e.g. nightly full scans).
.aicap-base:
  stage: test
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl ca-certificates
    - >
      curl -fsSL
      "https://github.com/istrategeorge/AIcap/releases/download/${AICAP_VERSION}/aicap-linux-amd64"
      -o /usr/local/bin/aicap
    - chmod +x /usr/local/bin/aicap
  script:
    - aicap --cli "$CI_PROJECT_DIR"

# Default job: runs on MRs and on default-branch pushes. Fails the
# pipeline on any blocker (`.aicap.yml` policy violations or
# uncatalogued high-risk findings when `block_on_high_risk: true`).
aicap_compliance_scan:
  extends: .aicap-base
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: false

# Optional: emit CycloneDX 1.5 SBOM as a build artifact for
# downstream enterprise toolchains.
aicap_cyclonedx_sbom:
  extends: .aicap-base
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - aicap --cli "$CI_PROJECT_DIR" --cyclonedx > sbom.cdx.json
  artifacts:
    paths:
      - sbom.cdx.json
    expire_in: 30 days
