# AIcap — Continuous AI-BOM & EU AI Act Compliance Scanner
# Bitbucket Pipelines template
#
# Required Repository Variable (Repository settings → Pipelines → Repository variables):
#   AICAP_API_KEY    — your Pro API key. Mark as "Secured".
#                      Free users can omit this; the scanner runs
#                      locally without cloud sync.
#
# Optional Repository Variables:
#   AICAP_VERSION         — pin a specific release tag (default: v1.0.0-beta).
#   AICAP_OSV_DISABLED    — "true" to skip OSV.dev CVE/GHSA enrichment.
#
# Copy this file into your repo as `bitbucket-pipelines.yml` and adjust
# branch/PR rules to match your workflow.

image: alpine:3.20

definitions:
  steps:
    - step: &aicap-scan
        name: AIcap Compliance Scan
        script:
          - apk add --no-cache curl ca-certificates
          - AICAP_VERSION="${AICAP_VERSION:-v1.0.0-beta}"
          - >
            curl -fsSL
            "https://github.com/istrategeorge/AIcap/releases/download/${AICAP_VERSION}/aicap-linux-amd64"
            -o /usr/local/bin/aicap
          - chmod +x /usr/local/bin/aicap
          - aicap --cli "$BITBUCKET_CLONE_DIR"

    - step: &aicap-cyclonedx
        name: AIcap CycloneDX SBOM
        script:
          - apk add --no-cache curl ca-certificates
          - AICAP_VERSION="${AICAP_VERSION:-v1.0.0-beta}"
          - >
            curl -fsSL
            "https://github.com/istrategeorge/AIcap/releases/download/${AICAP_VERSION}/aicap-linux-amd64"
            -o /usr/local/bin/aicap
          - chmod +x /usr/local/bin/aicap
          - aicap --cli "$BITBUCKET_CLONE_DIR" --cyclonedx > sbom.cdx.json
        artifacts:
          - sbom.cdx.json

pipelines:
  default:
    - step: *aicap-scan

  pull-requests:
    '**':
      - step: *aicap-scan

  branches:
    main:
      - step: *aicap-scan
      - step: *aicap-cyclonedx
    master:
      - step: *aicap-scan
      - step: *aicap-cyclonedx
