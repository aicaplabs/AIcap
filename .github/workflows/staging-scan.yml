name: Staging AI-BOM Scanner

on:
  push:
    branches: [ "development" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Build and Run AIcap for Staging
        continue-on-error: true
        env:
          AICAP_API_KEY: ${{ secrets.AICAP_API_KEY }} # Or a dedicated staging key
          # NOTE: the old Render staging backend is gone. Wave 13 consolidated
          # onto a single EU backend (Scaleway, fr-par), so development-branch
          # scans now sync to the same backend as production. Stand up a
          # separate Scaleway container + key here if you want isolation again.
          AICAP_API_URL: "https://aicap9ceb68db-aicap-backend.functions.fnc.fr-par.scw.cloud/api/save-proof"
        run: |
          go build -o aicap .
          ./aicap --cli .