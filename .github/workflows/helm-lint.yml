name: Helm Lint

on:
  push:
    branches: [ "main", "development" ]
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm-lint.yml'
  pull_request:
    branches: [ "main", "development" ]
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm-lint.yml'

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: helm lint (defaults)
        run: helm lint deploy/helm/aicap/

      - name: helm template (defaults — inline secrets)
        run: |
          helm template aicap deploy/helm/aicap/ \
            --set secrets.supabaseDbUrl="postgres://user:pass@db:5432/aicap?sslmode=require" \
            --set secrets.supabaseJwtSecret="test-jwt-secret" \
            --set secrets.stripeSecretKey="sk_test_placeholder" \
            --set secrets.stripeWebhookSecret="whsec_placeholder" \
            > /dev/null

      - name: helm template (existingSecret — external secrets manager)
        run: |
          helm template aicap deploy/helm/aicap/ \
            --set secrets.existingSecret="my-prod-secret" \
            > /dev/null

      - name: helm template (migrationJob.enabled=true)
        run: |
          helm template aicap deploy/helm/aicap/ \
            --set secrets.existingSecret="my-prod-secret" \
            --set migrationJob.enabled=true \
            --set config.runMigrations=false \
            > /dev/null

      - name: helm template (HPA + Ingress + PDB enabled)
        run: |
          helm template aicap deploy/helm/aicap/ \
            --set secrets.existingSecret="my-prod-secret" \
            --set autoscaling.enabled=true \
            --set ingress.enabled=true \
            --set "ingress.hosts[0].host=aicap.example.com" \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --set podDisruptionBudget.enabled=true \
            > /dev/null
